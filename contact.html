<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Tshepo Monareng</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header" aria-label="Site header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="Home">Tshepo Monareng</a>
      <nav class="main-nav" aria-label="Main Navigation">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="projects.html" class="nav-link">Projects</a></li>
          <li><a href="contact.html" class="nav-link" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" role="main">

    <section class="section" aria-labelledby="contact-title">
      <h1 id="contact-title">Get In Touch</h1>
      <p style="color: var(--muted); margin-bottom: 24px;">Have a project in mind or want to collaborate? Fill in the form below and I'll get back to you as soon as possible.</p>

      <form class="contact-form" action="#" method="post" novalidate aria-label="Contact form">

        <div class="form-row">
          <label for="name">Full Name <span aria-hidden="true">*</span></label>
          <input type="text" id="name" name="name" autocomplete="name" required placeholder="Tshepo Monareng" />
        </div>

        <div class="form-row">
          <label for="email">Email Address <span aria-hidden="true">*</span></label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="tshepo@example.com" />
        </div>

        <div class="form-row">
          <label for="phone">Phone Number (optional)</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="+27 00 000 0000" />
        </div>

        <div class="form-row">
          <label for="website">Your Website (optional)</label>
          <input type="url" id="website" name="website" autocomplete="url" placeholder="https://yoursite.com" />
        </div>

        <div class="form-row">
          <label for="subject">Subject <span aria-hidden="true">*</span></label>
          <select id="subject" name="subject" required>
            <option value="" disabled selected>Select a topic…</option>
            <option value="freelance">Freelance project</option>
            <option value="fulltime">Full-time opportunity</option>
            <option value="collaboration">Collaboration</option>
            <option value="other">Other</option>
          </select>
        </div>

        <fieldset style="border: none; padding: 0;">
          <legend style="font-size: 0.95rem; color: var(--muted); margin-bottom: 8px;">Preferred contact method</legend>
          <div class="radio-group">
            <label><input type="radio" name="contact_pref" value="email" checked /> Email</label>
            <label><input type="radio" name="contact_pref" value="phone" /> Phone</label>
          </div>
        </fieldset>

        <div class="form-row">
          <label for="message">Message <span aria-hidden="true">*</span></label>
          <textarea id="message" name="message" required placeholder="Tell me about your project or just say hello…"></textarea>
        </div>

        <div>
          <button type="submit" class="btn" style="border: none; cursor: pointer; font-size: 1rem;">Send Message</button>
        </div>

      </form>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p>&copy; 2026 Tshepo Monareng. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
